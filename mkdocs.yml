site_name: PocketBase KMP
site_description: Kotlin Multiplatform SDK for PocketBase
site_url: https://androidpoet.github.io/pocketbase-kmp/
repo_url: https://github.com/AndroidPoet/pocketbase-kmp
repo_name: AndroidPoet/pocketbase-kmp

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.share

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: guides/getting-started.md
  - Authentication Guide: guides/authentication.md
  - Records Guide: guides/records.md
  - Files Guide: guides/files.md
  - Realtime Guide: guides/realtime.md
  - Admin Services: guides/admin-services.md
  - API Overview: api/overview.md
  - API:
    - Client: api/client.md
    - Auth: api/auth.md
    - Records: api/records.md
    - Files: api/files.md
    - Realtime: api/realtime.md
  - FAQ: faq.md
